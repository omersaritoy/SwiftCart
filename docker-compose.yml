version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: swift-cart-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: swift-cart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: