spring:
  application:
    name: SwiftCart

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/swift-cart}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379



  mail:
    host: smtp.gmail.com
    port: 587
    username: ${YOUR_EMAIL_ADDRESS}
    password: ${YOUR_EMAIL_APP_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    root: info
    org:
      springframework:
        security: Trace
      hibernate: warn
server:
  port: 8081
app:
  base:
    url: http://localhost:8081

kind: Application



